<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>候鸟水鸟专题 | 飞禽鸟类百科</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="bird.css">
    <style>
        #nav {
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
            background-color: rgba(255,255,255,0.15);
            transition: all 0.3s ease;
        }
        #nav.scrolled {
            background-color: #e8f3ee;
            box-shadow: 0 2px 12px rgba(120, 160, 140, 0.18);
        }
        #nav div:first-child {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 1px;
        }
        #nav.scrolled div:first-child {
            color: #3a6b5a;
        }
        #nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #ffffff;
            font-size: 15px;
            padding: 6px 10px;
            border-radius: 6px;
            transition: 0.3s;
        }
        #nav.scrolled a {
            color: #446357;
        }
        #nav a.active {
            background-color: #c8e2d7;
            color: #2d5748 !important;
        }
        #nav a:hover {
            background-color: rgba(255,255,255,0.25);
        }
        #nav.scrolled a:hover {
            background-color: #d7e9e1;
        }

        .migrate-banner {
            width: 100%;
            height: 60vh;
            margin-top: 64px;
            position: relative;
            background-image: url('https://picsum.photos/id/1037/1920/1080');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .banner-mask {
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.42);
        }
        .banner-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            text-align: center;
            color: #fff;
        }
        .banner-content h1 {
            font-size: 42px;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }
        .banner-content p {
            font-size: 18px;
            opacity: 0.9;
        }

        .common-title {
            font-size: 28px;
            color: #356655;
            text-align: center;
            margin-bottom: 10px;
        }
        .line {
            width: 80px;
            height: 3px;
            background-color: #73b89f;
            margin: 0 auto 30px;
            border-radius: 3px;
        }

        .intro {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 24px;
        }
        .intro p {
            line-height: 1.8;
            color: #2c3e35;
            font-size: 16px;
            text-indent: 2em;
        }
        .back-index{
            display:block;
            text-align:center;
            margin-bottom:20px;
            color:#487d6b;
            text-decoration:none;
        }

        .zone-title {
            font-size: 28px;
            color: #356655;
            text-align: center;
            margin-bottom: 10px;
        }
        .zone-line {
            width: 100px;
            height: 3px;
            background: #73b89f;
            margin: 0 auto 40px;
            border-radius: 3px;
        }
        .layer-wrap {
            max-width: 1200px;
            margin: 0 auto 80px;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 48px;
        }
        .layer-item {
            display: flex;
            gap: 32px;
            align-items: center;
        }
        .layer-item:nth-child(even) {
            flex-direction: row-reverse;
        }
        .layer-image {
            width: 50%;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(120, 160, 140, 0.12);
        }
        .layer-image img {
            width: 100%;
            display: block;
        }
        .layer-text {
            width: 50%;
        }
        .layer-depth {
            display: inline-block;
            padding: 4px 12px;
            background: #c8e2d7;
            color: #2d5748;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .layer-text h3 {
            font-size: 24px;
            color: #2f5e4e;
            margin-bottom: 16px;
        }
        .layer-text p {
            line-height: 1.8;
            color: #4a6b5f;
        }

        .feature-wrap {
            max-width: 1200px;
            margin: 0 auto 80px;
            padding: 0 24px;
        }
        .feature-box {
            display: flex;
            gap: 36px;
            align-items: center;
        }
        .feature-text {
            width: 55%;
        }
        .feature-text h3 {
            font-size: 24px;
            color: #2f5e4e;
            margin-bottom: 16px;
        }
        .feature-text p {
            line-height: 1.8;
            color: #4a6b5f;
            margin-bottom: 16px;
        }
        .feature-list {
            padding-left: 22px;
            line-height: 1.8;
            color: #426559;
        }
        .feature-list li {
            margin: 8px 0;
        }
        .feature-img {
            width: 45%;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(120, 160, 140, 0.12);
        }
        .feature-img img {
            width: 100%;
            display: block;
        }

        .species-wrap {
            max-width: 1200px;
            margin: 0 auto 80px;
            padding: 0 24px;
        }
        .species-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        .species-card {
            background: #ffffff;
            border: 1px solid #e1ede8;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(135, 175, 160, 0.08);
            transition: all 0.3s ease;
        }
        .species-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 6px 18px rgba(120, 165, 145, 0.14);
        }
        .species-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }
        .species-content {
            padding: 24px;
        }
        .species-content h3 {
            color: #2f5e4e;
            font-size: 20px;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 4px solid #73b89f;
        }
        .species-content p {
            color: #4a6b5f;
            line-height: 1.7;
            font-size: 14.5px;
        }
        .species-content strong {
            color: #c0392b;
        }

        .eco-wrap {
            max-width: 1200px;
            margin: 0 auto 80px;
            padding: 0 24px;
        }
        .eco-desc {
            line-height: 1.8;
            text-indent: 2em;
            color: #2c3e35;
            font-size: 16px;
        }

        footer {
            width: 100%;
            text-align: center;
            padding: 30px 0;
            background-color: #e8f3ee;
            color: #608073;
            font-size: 14px;
        }

        .top-btn {
            position: fixed;
            right: 40px;
            bottom: 40px;
            width: 46px;
            height: 46px;
            background: #81bca6;
            color: #fff;
            text-align: center;
            line-height: 46px;
            border-radius: 50%;
            text-decoration: none;
            font-size: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            z-index: 998;
        }
        .top-btn:hover {
            background: #5fa88d;
        }
    </style>
</head>

<body>
